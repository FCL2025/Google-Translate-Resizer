<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Google Translate Resizer icon</title>
  <desc id="desc">A blue rounded square with two translation panels, resize arrows, and the GTR wordmark.</desc>
  <defs>
    <linearGradient id="tile" x1="72" y1="48" x2="440" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b7de9"/>
      <stop offset="1" stop-color="#185abc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#174ea6" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect x="34" y="34" width="444" height="444" rx="94" fill="url(#tile)" filter="url(#shadow)"/>
  <rect x="84" y="120" width="168" height="142" rx="24" fill="#ffffff" opacity="0.96"/>
  <rect x="260" y="120" width="168" height="142" rx="24" fill="#e8f0fe" opacity="0.98"/>
  <path d="M206 191h100" fill="none" stroke="#1a73e8" stroke-width="18" stroke-linecap="round"/>
  <path d="M212 155l-38 36 38 36" fill="none" stroke="#1a73e8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M300 155l38 36-38 36" fill="none" stroke="#1a73e8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="256" cy="191" r="13" fill="#34a853"/>
  <text x="256" y="386" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-4" fill="#ffffff">GTR</text>
  <rect x="149" y="411" width="214" height="12" rx="6" fill="#fbbc04"/>
</svg>
